<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Slash - SVG Hack'n Slash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #111; overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            color: white; user-select: none;
        }
        
        canvas {
            display: block;
            /* Indispensable pour garder le look pixel art sans flou */
            image-rendering: pixelated; 
        }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }

        .bar-container {
            position: absolute; left: 20px; width: 300px; height: 20px;
            background: #222; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        #hp-bar-bg { top: 20px; }
        #xp-bar-bg { top: 55px; height: 10px; border-color: #aaa;}

        #hp-bar { width: 100%; height: 100%; background: #e74c3c; transition: width 0.1s linear; }
        #xp-bar { width: 0%; height: 100%; background: #3498db; transition: width 0.2s ease-out; }

        #stats {
            position: absolute; top: 80px; left: 20px; font-size: 12px;
            text-shadow: 2px 2px 0 #000; line-height: 1.5;
        }

        #wave-info {
            position: absolute; top: 20px; right: 20px; font-size: 16px; text-align: right; text-shadow: 2px 2px 0 #000;
        }

        /* Menu de montée de niveau */
        #upgrade-modal, #game-over-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.95); border: 4px solid #fff;
            padding: 30px; text-align: center; box-shadow: 0 0 30px #3498db;
            pointer-events: auto; display: none; flex-direction: column; gap: 20px;
        }

        h2 { margin: 0; color: #f1c40f; text-shadow: 2px 2px 0 #000; }
        
        .upgrade-btn {
            background: #2c3e50; border: 2px solid #3498db; color: white;
            padding: 15px; font-family: inherit; font-size: 12px;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }

        .upgrade-btn:hover { background: #3498db; transform: scale(1.05); box-shadow: 0 0 15px #3498db;}
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="hp-bar-bg"><div id="hp-bar"></div></div>
        <div id="xp-bar-bg"><div id="xp-bar"></div></div>
        <div id="stats">Niveau 1</div>
        <div id="wave-info">Vague 1<br><span id="enemies-left" style="font-size:10px;color:#aaa">Ennemis: 0</span></div>
    </div>

    <div id="upgrade-modal">
        <h2>Niveau Supérieur !</h2>
        <p style="font-size: 10px; color:#aaa;">Choisis une amélioration</p>
        <div id="upgrade-options" style="display:flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div id="game-over-modal">
        <h2 style="color: #e74c3c;">VOUS ETES MORT</h2>
        <button class="upgrade-btn" onclick="location.reload()">Rejouer</button>
    </div>

<script>
/**
 * 1. GÉNÉRATEUR DE TEXTURES PIXEL ART -> SVG
 * Crée des SVG à la volée pour garder l'esprit "code unique" et ultra léger.
 */
function createPixelArtSVG(grid, palette) {
    const size = grid.length;
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" shape-rendering="crispEdges">`;
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            const char = grid;
            if (char !== '.' && palette) {
                svg += `<rect x="${x}" y="${y}" width="1" height="1" fill="${palette}" />`;
            }
        }
    }
    svg += `</svg>`;
    return "data:image/svg+xml;base64," + btoa(svg);
}

// Sprites 12x12
const palPlayer = { '0':'#000', '1':'#ecf0f1', '2':'#f1c40f', '3':'#e67e22', '4':'#2980b9' };
const gridPlayer =;

const palSlime = { '0':'#000', '1':'#2ecc71', '2':'#27ae60', '3':'#fff' };
const gridSlime =;

const imgPlayer = new Image(); imgPlayer.src = createPixelArtSVG(gridPlayer, palPlayer);
const imgSlime = new Image(); imgSlime.src = createPixelArtSVG(gridSlime, palSlime);

/**
 * 2. INITIALISATION DU JEU & MOTEUR
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let cw, ch;

function resize() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false; // Pixel art net
}
window.addEventListener('resize', resize);
resize();

// Entrées (Clavier / Souris)
const keys = { w:false, a:false, s:false, d:false };
const mouse = { x: 0, y: 0, down: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if(k==='z'||k==='w'||k==='arrowup') keys.w = true;
    if(k==='q'||k==='a'||k==='arrowleft') keys.a = true;
    if(k==='s'||k==='arrowdown') keys.s = true;
    if(k==='d'||k==='arrowright') keys.d = true;
});
window.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if(k==='z'||k==='w'||k==='arrowup') keys.w = false;
    if(k==='q'||k==='a'||k==='arrowleft') keys.a = false;
    if(k==='s'||k==='arrowdown') keys.s = false;
    if(k==='d'||k==='arrowright') keys.d = false;
});
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => { mouse.down = true; });
window.addEventListener('mouseup', e => { mouse.down = false; });

/**
 * 3. CLASSES ET ENTITÉS
 */
class Camera {
    constructor() { this.x = 0; this.y = 0; this.shakeX = 0; this.shakeY = 0; this.shakeIntensity = 0; }
    update(targetX, targetY) {
        // Lerp ultra smooth
        this.x += (targetX - cw/2 - this.x) * 0.1;
        this.y += (targetY - ch/2 - this.y) * 0.1;
        
        if (this.shakeIntensity > 0) {
            this.shakeX = (Math.random() - 0.5) * this.shakeIntensity;
            this.shakeY = (Math.random() - 0.5) * this.shakeIntensity;
            this.shakeIntensity *= 0.9;
            if (this.shakeIntensity < 0.5) this.shakeIntensity = 0;
        } else {
            this.shakeX = this.shakeY = 0;
        }
    }
    shake(amount) { this.shakeIntensity = amount; }
}

class Player {
    constructor() {
        this.x = 0; this.y = 0; this.vx = 0; this.vy = 0;
        this.size = 48; // Taille affichée
        this.accel = 1500; this.friction = 0.82;
        this.maxHp = 100; this.hp = 100;
        this.level = 1; this.xp = 0; this.xpNeeded = 100;
        
        // Stats
        this.speedMult = 1;
        this.damage = 25;
        this.attackCooldown = 0.3; // en secondes
        this.attackTimer = 0;
        this.attackRange = 80;
        
        // Magie (missiles auto)
        this.magicLevel = 0;
        this.magicTimer = 0;
    }

    update(dt) {
        let dx = 0, dy = 0;
        if(keys.w) dy -= 1; if(keys.s) dy += 1;
        if(keys.a) dx -= 1; if(keys.d) dx += 1;
        
        // Normalisation de la diagonale
        if(dx !== 0 && dy !== 0) {
            const length = Math.sqrt(dx*dx + dy*dy);
            dx /= length; dy /= length;
        }

        // Physique fluide
        this.vx += dx * this.accel * this.speedMult * dt;
        this.vy += dy * this.accel * this.speedMult * dt;
        this.vx *= this.friction;
        this.vy *= this.friction;

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Attaque manuelle
        this.attackTimer -= dt;
        if (mouse.down && this.attackTimer <= 0) {
            this.attack();
        }

        // Magie automatique
        if (this.magicLevel > 0) {
            this.magicTimer -= dt;
            if (this.magicTimer <= 0) {
                this.castMagic();
                this.magicTimer = Math.max(0.2, 1.5 - (this.magicLevel * 0.2)); // Tire de plus en plus vite
            }
        }
    }

    attack() {
        this.attackTimer = this.attackCooldown;
        const angle = Math.atan2(mouse.worldY - this.y, mouse.worldX - this.x);
        
        // Créer l'effet de frappe (Slash)
        slashes.push(new Slash(this.x, this.y, angle, this.attackRange));
        cam.shake(10);

        // Détection collision en arc de cercle
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies;
            const dist = Math.hypot(e.x - this.x, e.y - this.y);
            if (dist < this.attackRange + e.size/2) {
                const angleToEnemy = Math.atan2(e.y - this.y, e.x - this.x);
                let angleDiff = angleToEnemy - angle;
                // Normalisation de l'angle entre -PI et PI
                angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
                
                if (Math.abs(angleDiff) < Math.PI / 2.5) { // Cône d'attaque
                    e.takeDamage(this.damage);
                    // Knockback
                    e.vx += Math.cos(angle) * 400;
                    e.vy += Math.sin(angle) * 400;
                }
            }
        }
    }

    castMagic() {
        if (enemies.length === 0) return;
        // Trouve l'ennemi le plus proche
        let closest = null, minDist = Infinity;
        enemies.forEach(e => {
            const dist = Math.hypot(e.x - this.x, e.y - this.y);
            if (dist < minDist) { minDist = dist; closest = e; }
        });

        if (closest) {
            const angle = Math.atan2(closest.y - this.y, closest.x - this.x);
            projectiles.push(new Projectile(this.x, this.y, angle, 15 + this.magicLevel * 5));
        }
    }

    gainXp(amount) {
        this.xp += amount;
        if (this.xp >= this.xpNeeded) {
            this.xp -= this.xpNeeded;
            this.level++;
            this.xpNeeded = Math.floor(this.xpNeeded * 1.5);
            this.hp = this.maxHp; // Soin au passage de niveau
            triggerLevelUp();
        }
        updateUI();
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        // Effet miroir si on va vers la gauche
        if (mouse.worldX < this.x) ctx.scale(-1, 1);
        
        // Petit effet de rebond (bop) lié à la vitesse
        const speed = Math.hypot(this.vx, this.vy);
        const bop = Math.abs(Math.sin(Date.now() * 0.015)) * (speed * 0.01);
        ctx.translate(0, -bop);
        
        ctx.drawImage(imgPlayer, -this.size/2, -this.size/2, this.size, this.size);
        ctx.restore();
    }
}

class Enemy {
    constructor(x, y, hp, speed, damage) {
        this.x = x; this.y = y; this.vx = 0; this.vy = 0;
        this.size = 40;
        this.hp = hp; this.maxHp = hp;
        this.speed = speed; this.damage = damage;
        this.attackTimer = 0;
    }

    update(dt) {
        // Suit le joueur
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.vx += Math.cos(angle) * this.speed * dt * 10;
        this.vy += Math.sin(angle) * this.speed * dt * 10;
        
        this.vx *= 0.85; // friction 
        this.vy *= 0.85;

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Éviter le chevauchement avec les autres ennemis
        for (let other of enemies) {
            if (other === this) continue;
            const dx = this.x - other.x;
            const dy = this.y - other.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.size && dist > 0) {
                this.x += (dx / dist) * 1;
                this.y += (dy / dist) * 1;
            }
        }

        // Collision joueur
        const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
        this.attackTimer -= dt;
        if (distToPlayer < (this.size/2 + player.size/2) && this.attackTimer <= 0) {
            player.hp -= this.damage;
            this.attackTimer = 1.0;
            spawnParticles(this.x, this.y, '#e74c3c', 10);
            cam.shake(15);
            updateUI();
            if (player.hp <= 0) gameOver();
        }
    }

    takeDamage(amount) {
        this.hp -= amount;
        spawnParticles(this.x, this.y, '#2ecc71', 5);
        floatingTexts.push(new FloatingText(this.x, this.y - 20, Math.floor(amount), '#f1c40f'));
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (player.x < this.x) ctx.scale(-1, 1);
        ctx.drawImage(imgSlime, -this.size/2, -this.size/2, this.size, this.size);
        
        // Barre de vie de l'ennemi (si blessé)
        if(this.hp < this.maxHp) {
            ctx.fillStyle = '#e74c3c';
            const w = 30;
            ctx.fillRect(-w/2, -this.size/2 - 10, w * (this.hp/this.maxHp), 4);
        }
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color, speedScale = 1) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 300 * speedScale + 50;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.color = color;
        this.size = Math.random() * 6 + 2;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vx *= 0.9; this.vy *= 0.9;
        this.life -= dt * 2;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

class Slash {
    constructor(x, y, angle, radius) {
        this.x = x; this.y = y; this.angle = angle; this.radius = radius;
        this.life = 1.0;
    }
    update(dt) { this.life -= dt * 6; }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, -Math.PI/3, Math.PI/3);
        ctx.lineWidth = this.life * 15;
        ctx.strokeStyle = `rgba(255, 255, 255, ${this.life})`;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, this.radius - 10, -Math.PI/3, Math.PI/3);
        ctx.lineWidth = this.life * 5;
        ctx.strokeStyle = `rgba(52, 152, 219, ${this.life})`;
        ctx.stroke();
        
        ctx.restore();
    }
}

class Projectile {
    constructor(x, y, angle, damage) {
        this.x = x; this.y = y;
        this.vx = Math.cos(angle) * 500;
        this.vy = Math.sin(angle) * 500;
        this.damage = damage;
        this.life = 2.0;
    }
    update(dt) {
        this.x += this.vx * dt; this.y += this.vy * dt;
        this.life -= dt;
        spawnParticles(this.x, this.y, '#9b59b6', 0.2); // Traînée magique

        // Collision
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies;
            if (Math.hypot(e.x - this.x, e.y - this.y) < e.size/2 + 10) {
                e.takeDamage(this.damage);
                this.life = 0; // Détruit le projectile
                break;
            }
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 8, 0, Math.PI*2);
        ctx.fillStyle = '#9b59b6';
        ctx.fill();
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#8e44ad';
    }
}

class FloatingText {
    constructor(x, y, text, color) {
        this.x = x + (Math.random() * 20 - 10);
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 1.0;
        this.vy = -50;
    }
    update(dt) {
        this.y += this.vy * dt;
        this.life -= dt * 1.5;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.font = '14px "Press Start 2P"';
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1;
    }
}

/**
 * 4. GESTION DU JEU & VAGUES
 */
let player, cam;
let enemies = [], particles = [], slashes = [], floatingTexts =[], projectiles =[];
let lastTime = 0;
let gameState = 'playing'; // playing, upgrade, gameover
let wave = 1;
let enemiesToSpawn = 0;
let spawnTimer = 0;

function init() {
    player = new Player();
    cam = new Camera();
    enemies =[]; particles = []; slashes = []; floatingTexts = []; projectiles =[];
    wave = 1;
    startWave();
    updateUI();
    requestAnimationFrame(loop);
}

function startWave() {
    enemiesToSpawn = 5 + wave * 5;
    document.getElementById('wave-info').innerHTML = `Vague ${wave}<br><span id="enemies-left" style="font-size:10px;color:#aaa">Restants: ${enemies.length + enemiesToSpawn}</span>`;
}

function spawnEnemy() {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.max(cw, ch) / 2 + 100; // Spawn en dehors de l'écran
    const ex = player.x + Math.cos(angle) * dist;
    const ey = player.y + Math.sin(angle) * dist;
    
    const hp = 30 + wave * 20;
    const speed = 100 + wave * 5;
    const damage = 5 + wave * 2;
    enemies.push(new Enemy(ex, ey, hp, speed, damage));
}

function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}

function updateUI() {
    document.getElementById('hp-bar').style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
    document.getElementById('xp-bar').style.width = `${(player.xp / player.xpNeeded) * 100}%`;
    document.getElementById('stats').innerHTML = `
        Niveau: ${player.level} <br>
        Dégâts: ${player.damage} <br>
        HP: ${Math.floor(player.hp)}/${player.maxHp}
    `;
    const elLeft = document.getElementById('enemies-left');
    if(elLeft) elLeft.innerText = `Restants: ${enemies.length + enemiesToSpawn}`;
}

/**
 * 5. SYSTÈME D'AMÉLIORATION (LEVEL UP)
 */
const upgrades =;

function triggerLevelUp() {
    gameState = 'upgrade';
    const modal = document.getElementById('upgrade-modal');
    const container = document.getElementById('upgrade-options');
    container.innerHTML = '';
    
    // Tire 3 améliorations au hasard
    let shuffled = upgrades.sort(() => 0.5 - Math.random());
    let choices = shuffled.slice(0, 3);
    
    choices.forEach((upg, index) => {
        const btn = document.createElement('button');
        btn.className = 'upgrade-btn';
        btn.innerHTML = `<strong>${upg.name}</strong><br><span style="font-size:8px;color:#bdc3c7">${upg.desc}</span>`;
        btn.onclick = () => {
            upg.apply();
            modal.style.display = 'none';
            gameState = 'playing';
            updateUI();
        };
        container.appendChild(btn);
    });
    
    modal.style.display = 'flex';
}

function gameOver() {
    gameState = 'gameover';
    document.getElementById('game-over-modal').style.display = 'flex';
}

/**
 * 6. BOUCLE PRINCIPALE (Mise à jour et Rendu)
 */
function update(dt) {
    if (gameState !== 'playing') return;

    // Calcul de la position de la souris dans le monde
    mouse.worldX = mouse.x + cam.x + cam.shakeX;
    mouse.worldY = mouse.y + cam.y + cam.shakeY;

    player.update(dt);
    cam.update(player.x, player.y);

    // Spawner
    if (enemiesToSpawn > 0) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
            spawnEnemy();
            enemiesToSpawn--;
            spawnTimer = 0.5 - Math.min(0.4, wave * 0.02); // De plus en plus vite
            updateUI();
        }
    } else if (enemies.length === 0) {
        wave++;
        startWave();
    }

    // Update Entités
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies;
        e.update(dt);
        if (e.hp <= 0) {
            spawnParticles(e.x, e.y, '#3498db', 15);
            player.gainXp(15 + wave * 5);
            enemies.splice(i, 1);
            updateUI();
        }
    }

    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);

    slashes.forEach(s => s.update(dt));
    slashes = slashes.filter(s => s.life > 0);

    projectiles.forEach(p => p.update(dt));
    projectiles = projectiles.filter(p => p.life > 0);

    floatingTexts.forEach(ft => ft.update(dt));
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

function drawGrid() {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 2;
    const gridSize = 100;
    const startX = Math.floor(cam.x / gridSize) * gridSize;
    const startY = Math.floor(cam.y / gridSize) * gridSize;
    
    ctx.beginPath();
    for (let x = startX; x < cam.x + cw; x += gridSize) {
        ctx.moveTo(x, cam.y); ctx.lineTo(x, cam.y + ch);
    }
    for (let y = startY; y < cam.y + ch; y += gridSize) {
        ctx.moveTo(cam.x, y); ctx.lineTo(cam.x + cw, y);
    }
    ctx.stroke();
}

function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, cw, ch);

    ctx.save();
    // Application de la caméra
    ctx.translate(-cam.x - cam.shakeX, -cam.y - cam.shakeY);

    drawGrid();

    // Rendu avec effets ultra smooth (Blend modes)
    ctx.globalCompositeOperation = 'lighter';
    particles.forEach(p => p.draw());
    projectiles.forEach(p => p.draw());
    slashes.forEach(s => s.draw());
    ctx.globalCompositeOperation = 'source-over'; // Reset

    // Tri Y pour la fausse 3D/profondeur
    const renderList =.sort((a, b) => a.y - b.y);
    renderList.forEach(entity => entity.draw());

    floatingTexts.forEach(ft => ft.draw());

    // Curseur cible visée
    if (gameState === 'playing') {
        ctx.beginPath();
        ctx.arc(mouse.worldX, mouse.worldY, 5, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(231, 76, 60, 0.5)';
        ctx.fill();
    }

    ctx.restore();
}

function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1); // Limité à 0.1s max pour éviter les sauts
    lastTime = timestamp;

    update(dt);
    draw();

    requestAnimationFrame(loop);
}
