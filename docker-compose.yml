name: lea

services:
  # ============================================
  # Kali MCP Service (LEA Managed)
  # ============================================
  lea-kali-mcp:
    build:
      context: ./docker/kali-mcp
      dockerfile: Dockerfile
    container_name: lea-kali-mcp
    restart: unless-stopped
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3002
      WORKSPACE_ROOT: /workspace
    ports:
      - "${LEA_KALI_MCP_BIND_ADDR:-127.0.0.1}:3002:3002"
    volumes:
      - kali_pentests:/workspace/pentests
      - kali_shared:/workspace/shared
      - kali_logs:/workspace/logs
    networks:
      - lea-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/lea-kali/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: lea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lea_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lea_secure_password_change_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-lea_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lea_admin} -d ${POSTGRES_DB:-lea_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lea-network

  # Dev-only local database port exposure. Enable with: docker compose --profile dev up
  postgres-dev-port:
    image: alpine/socat:1.8.0.3
    container_name: lea-postgres-dev-port
    restart: unless-stopped
    command: ["TCP-LISTEN:5433,fork,reuseaddr", "TCP:postgres:5432"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LEA_POSTGRES_DEV_BIND_ADDR:-127.0.0.1}:5433:5433"
    networks:
      - lea-network
    profiles:
      - dev

  # ============================================
  # Backend API Service
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lea-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Keep the in-container listen port stable when SSL_ENABLED=true.
      SSL_PORT: 3001
      HOST: 0.0.0.0
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - ~/.gemini:/home/lea/.gemini:ro
    ports:
      - "${LEA_BIND_ADDR:-127.0.0.1}:3001:3001"
      # OAuth callback server used by Antigravity/Gemini desktop-style auth flows.
      - "${LEA_OAUTH_CALLBACK_BIND_ADDR:-127.0.0.1}:51121:51121"
    depends_on:
      lea-kali-mcp:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - lea-network
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$SSL_ENABLED\" = \"true\" ]; then wget --no-check-certificate --quiet --tries=1 --spider https://localhost:$${SSL_PORT:-3001}/health; else wget --quiet --tries=1 --spider http://localhost:$${PORT:-3001}/health; fi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Frontend UI Service (Next.js)
  # ============================================
  frontend:
    build:
      context: ./lea-app
      dockerfile: Dockerfile
    container_name: lea-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:3001}
      NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-ws://backend:3001}
      API_URL: http://backend:3001
      PORT: 3000
    ports:
      - "${LEA_BIND_ADDR:-127.0.0.1}:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lea-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PgAdmin (Optional - for database management)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lea-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lea-platform.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env before enabling pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${LEA_PGADMIN_BIND_ADDR:-127.0.0.1}:5050:80"
    depends_on:
      - postgres
    networks:
      - lea-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - dev
    # Dev-only database UI. Do not enable this service in production.

networks:
  lea-network:
    driver: bridge
    name: lea-network

volumes:
  kali_pentests:
    name: lea-kali-pentests
  kali_shared:
    name: lea-kali-shared
  kali_logs:
    name: lea-kali-logs
  postgres_data:
    name: lea-postgres-data
  backend_uploads:
    name: lea-backend-uploads
  backend_logs:
    name: lea-backend-logs
  pgadmin_data:
    name: lea-pgadmin-data
